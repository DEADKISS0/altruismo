name: Farm Pipeline — Cada 2 horas

on:
  schedule:
    # Ejecuta cada 2 horas: 19:30, 21:30, 23:30, 01:30, 03:30, 05:30, 07:30, 09:30, 11:30, 13:30, 15:30, 17:30 (UTC)
    # Ajusta a tu zona horaria si es necesario
    - cron: "30 19,21,23,1,3,5,7,9,11,13,15,17 * * *"
  workflow_dispatch:

jobs:
  farm-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Run farm pipeline
        run: UPLOAD_TO_SUPABASE=1 node scripts/farm-pipeline.mjs
        working-directory: ./web
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BOT_USER_ID: ${{ secrets.BOT_USER_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_OWNER: ${{ secrets.GH_OWNER }}

      - name: Notify on failure
        if: failure()
        run: echo "Farm pipeline failed"