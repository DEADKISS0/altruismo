<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pomodoro Timer: temporizador de productividad con ciclos trabajo/descanso, notificaciones y estadísticas.">
  <title>Pomodoro Timer — Altruismo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0F0F0F; --surface: #1A1A1A; --surface-2: #252525; --text: #F5E6D3; --text-dim: #B8A99A; --accent: #CE3D1F; --accent-hover: #E34D2C; --work: #CE3D1F; --break: #10B981; --long-break: #3B82F6; --border: #333333; --radius: 16px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .container { width: 100%; max-width: 420px; }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: clamp(1.5rem, 5vw, 2rem); }
    h1 span { color: var(--accent); }
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.375rem; }
    .mode-tab { flex: 1; padding: 0.75rem; border: none; border-radius: 8px; background: transparent; color: var(--text-dim); font-family: inherit; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .mode-tab.active { background: var(--accent); color: var(--text); }
    .mode-tab[data-mode="shortBreak"].active { background: var(--break); }
    .mode-tab[data-mode="longBreak"].active { background: var(--long-break); }
    .timer-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; }
    .timer-svg { width: 200px; height: 200px; margin: 0 auto 1.5rem; transform: rotate(-90deg); }
    .timer-circle-bg { fill: none; stroke: var(--border); stroke-width: 8; }
    .timer-circle-progress { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
    .timer-display { font-family: 'Inter', monospace; font-size: clamp(3rem, 12vw, 5rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .timer-label { color: var(--text-dim); margin-bottom: 0.5rem; font-size: 0.9rem; }
    .controls { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
    .btn { padding: 1rem 2rem; border: none; border-radius: 10px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: var(--text); min-width: 140px; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary.running { animation: pulse 1.5s infinite; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); min-width: 100px; }
    .btn-secondary:hover { border-color: var(--accent); }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 2rem; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .settings-panel { margin-top: 1rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; display: none; }
    .settings-panel.open { display: block; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
    .settings-row label { font-size: 0.85rem; color: var(--text-dim); }
    .settings-row input { width: 80px; padding: 0.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; text-align: center; }
    .settings-btn { display: block; width: 100%; margin-top: 1rem; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text-dim); font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .settings-btn:hover { border-color: var(--accent); color: var(--text); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); opacity: 0; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 1rem 1.5rem; color: var(--text); font-size: 0.9rem; transition: all 0.3s; z-index: 100; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .key-hint { font-size: 0.7rem; color: var(--text-dim); margin-top: 1rem; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>Pomodoro <span>Timer</span></h1><p class="key-hint">Espacio para pausar/reanudar</p></header>

    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="work" data-duration="25">Trabajo</button>
      <button class="mode-tab" data-mode="shortBreak" data-duration="5">Descanso</button>
      <button class="mode-tab" data-mode="longBreak" data-duration="15">Largo</button>
    </div>

    <div class="timer-card">
      <svg class="timer-svg" viewBox="0 0 140 140">
        <circle class="timer-circle-bg" cx="70" cy="70" r="70"></circle>
        <circle class="timer-circle-progress" id="progressCircle" cx="70" cy="70" r="70"></circle>
      </svg>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-label" id="timerLabel">Tiempo de trabajo</div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn">Iniciar</button>
        <button class="btn btn-secondary" id="resetBtn">Reiniciar</button>
      </div>

      <div class="settings-panel" id="settingsPanel">
        <div class="settings-row"><label>Trabajo (min)</label><input type="number" id="workTime" value="25" min="1" max="180"></div>
        <div class="settings-row"><label>Descanso (min)</label><input type="number" id="shortBreakTime" value="5" min="1" max="60"></div>
        <div class="settings-row"><label>Descanso largo (min)</label><input type="number" id="longBreakTime" value="15" min="1" max="120"></div>
        <button class="btn" id="saveSettingsBtn" style="margin-top:0.5rem;padding:0.5rem 1rem;font-size:0.85rem;width:100%">Guardar</button>
      </div>

      <div class="stats">
        <div class="stat"><div class="stat-value" id="statSessions">0</div><div class="stat-label">Sesiones</div></div>
        <div class="stat"><div class="stat-value" id="statFocusTime">0h</div><div class="stat-label">Foco total</div></div>
        <div class="stat"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Racha</div></div>
      </div>

      <button class="settings-btn" id="settingsBtn">⚙ Configurar duraciones</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const MODES = { work: { label: 'Trabajo', color: '#CE3D1F', default: 25*60 }, shortBreak: { label: 'Descanso corto', color: '#10B981', default: 5*60 }, longBreak: { label: 'Descanso largo', color: '#3B82F6', default: 15*60 } };
    let currentMode = 'work';
    let durations = { work: 25*60, shortBreak: 5*60, longBreak: 15*60 };
    let timeLeft = durations.work;
    let timerId = null;
    let isRunning = false;
    let sessions = 0, totalFocus = 0, streak = 0, lastWorkDate = null;

    const $ = id => document.getElementById(id);
    const CIRCUMFERENCE = 2 * Math.PI * 70;

    $('progressCircle').style.strokeDasharray = CIRCUMFERENCE;

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
        setTimeout(() => {
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2); gain2.connect(ctx.destination);
          osc2.frequency.value = 1100;
          gain2.gain.setValueAtTime(0.3, ctx.currentTime);
          gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
          osc2.start(ctx.currentTime);
          osc2.stop(ctx.currentTime + 0.5);
        }, 200);
      } catch(e) {}
    }

    function loadStats() {
      try { const d = JSON.parse(localStorage.getItem('pomodoroStats')||'{}'); sessions=d.sessions||0; totalFocus=d.totalFocus||0; streak=d.streak||0; lastWorkDate=d.lastWorkDate||null; if(d.durations) durations={...durations,...d.durations}; updateStats(); } catch(e) {}
    }
    function saveStats() { localStorage.setItem('pomodoroStats', JSON.stringify({sessions,totalFocus,streak,lastWorkDate,durations})); }
    function updateStats() { $('statSessions').textContent=sessions; const h=Math.floor(totalFocus/3600), m=Math.floor((totalFocus%3600)/60); $('statFocusTime').textContent=h>0?`${h}h ${m}m`:`${m}m`; $('statStreak').textContent=streak; }
    function showToast(msg) { $('toast').textContent=msg; $('toast').classList.add('show'); setTimeout(()=>$('toast').classList.remove('show'),2500); }
    function formatTime(sec) { return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`; }
    function updateDisplay() { $('timerDisplay').textContent=formatTime(timeLeft); const total=durations[currentMode]; const progress=1-timeLeft/total; $('progressCircle').style.strokeDashoffset=CIRCUMFERENCE*(1-progress); }

    function switchMode(mode) { if(isRunning) return; currentMode=mode; timeLeft=durations[mode]; document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===mode)); $('timerLabel').textContent=MODES[mode].label; $('progressCircle').style.stroke=MODES[mode].color; updateDisplay(); }

    function tick() { if(timeLeft>0) { timeLeft--; updateDisplay(); } else { complete(); } }

    function complete() {
      clearInterval(timerId); isRunning=false; $('startBtn').textContent='Iniciar'; $('startBtn').classList.remove('running');
      playBeep();
      if(currentMode==='work') {
        sessions++; totalFocus+=durations.work; const today=new Date().toDateString();
        if(lastWorkDate===today) streak++;
        else { const y=new Date(Date.now()-86400000).toDateString(); streak=lastWorkDate===y?streak+1:1; }
        lastWorkDate=today; saveStats(); updateStats(); showToast('✅ Sesión completada. ¡Descansa!');
        if(Notification.permission==='granted') new Notification('Pomodoro',{body:'Sesión completada. ¡A descansar!'});
      } else { showToast('☕ Descanso terminado. ¡A trabajar!'); if(Notification.permission==='granted') new Notification('Pomodoro',{body:'Descanso terminado. ¡De vuelta!'}); }
    }

    function toggle() { isRunning?pause():start(); }
    function start() { if(Notification.permission==='default') Notification.requestPermission(); isRunning=true; $('startBtn').textContent='Pausar'; $('startBtn').classList.add('running'); timerId=setInterval(tick,1000); }
    function pause() { isRunning=false; clearInterval(timerId); $('startBtn').textContent='Continuar'; $('startBtn').classList.remove('running'); }
    function reset() { pause(); timeLeft=durations[currentMode]; updateDisplay(); }

    $('modeTabs').addEventListener('click', e => { const t=e.target.closest('.mode-tab'); if(t) switchMode(t.dataset.mode); });
    $('startBtn').addEventListener('click', toggle);
    $('resetBtn').addEventListener('click', reset);

    document.addEventListener('keydown', e => { if(e.code==='Space' && !e.target.matches('input,textarea,button,select')) { e.preventDefault(); toggle(); } });

    $('settingsBtn').addEventListener('click', () => {
      $('settingsPanel').classList.toggle('open');
      $('workTime').value = durations.work/60;
      $('shortBreakTime').value = durations.shortBreak/60;
      $('longBreakTime').value = durations.longBreak/15;
    });

    $('saveSettingsBtn').addEventListener('click', () => {
      const w=parseInt($('workTime').value)||25, s=parseInt($('shortBreakTime').value)||5, l=parseInt($('longBreakTime').value)||15;
      durations.work=w*60; durations.shortBreak=s*60; durations.longBreak=l*60;
      saveStats(); if(!isRunning) { timeLeft=durations[currentMode]; updateDisplay(); }
      $('settingsPanel').classList.remove('open');
      showToast('Duraciones actualizadas');
    });

    loadStats(); updateDisplay();
  </script>
</body>
</html>
