<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator — Altruismo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0F0F0F; --surface: #1A1A1A; --surface-2: #252525; --text: #F5E6D3; --text-dim: #B8A99A; --accent: #CE3D1F; --accent-hover: #E34D2C; --success: #10B981; --warning: #F59E0B; --error: #EF4444; --border: #333333; --radius: 12px; --font-mono: 'JetBrains Mono', monospace; --font-ui: 'Inter', system-ui, sans-serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-ui); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 560px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: clamp(1.8rem,5vw,2.6rem); margin-bottom:0.5rem; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--text-dim); font-size:0.9rem; }
    .card { background: var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1rem; }
    .password-display { background: var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:1.25rem; margin-bottom:1.5rem; position:relative; }
    .password-value { font-family: var(--font-mono); font-size:1.25rem; font-weight:500; letter-spacing:0.05em; word-break:break-all; margin-bottom:0.75rem; cursor:pointer; }
    .password-value:hover { color: var(--accent); }
    .strength-bar { height:6px; background:var(--bg); border-radius:3px; overflow:hidden; margin-bottom:0.5rem; }
    .strength-fill { height:100%; border-radius:3px; transition:width 0.3s, background 0.3s; }
    .strength-info { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-dim); }
    .mode-select { display:flex; gap:0.5rem; margin-bottom:1.5rem; }
    .mode-btn { flex:1; padding:0.6rem; border:1px solid var(--border); border-radius:8px; background:var(--surface-2); color:var(--text-dim); font-family:inherit; font-size:0.85rem; cursor:pointer; transition:all 0.2s; }
    .mode-btn.active { background:var(--accent); border-color:var(--accent); color:var(--text); }
    .options { display:grid; gap:1rem; }
    .slider-group { display:flex; align-items:center; gap:1rem; }
    .slider-group label { min-width:80px; font-size:0.85rem; color:var(--text-dim); }
    .slider-group input[type="range"] { flex:1; accent-color:var(--accent); }
    .slider-value { font-family:var(--font-mono); font-size:1.25rem; font-weight:700; min-width:3rem; text-align:right; }
    .option-row { display:flex; align-items:center; justify-content:space-between; }
    .option-label { font-size:0.85rem; }
    .option-label small { color:var(--text-dim); font-weight:400; }
    .toggle { position:relative; width:48px; height:26px; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:var(--border); border-radius:26px; transition:0.3s; }
    .toggle-slider:before { position:absolute; content:""; height:18px; width:18px; left:4px; bottom:4px; background:var(--text-dim); border-radius:50%; transition:0.3s; }
    .toggle input:checked+.toggle-slider { background:var(--accent); }
    .toggle input:checked+.toggle-slider:before { transform:translateX(22px); background:var(--text); }
    .actions { display:flex; gap:0.75rem; margin-top:1rem; }
    .btn { flex:1; padding:0.75rem; border:1px solid var(--border); border-radius:8px; background:var(--surface-2); color:var(--text); font-family:var(--font-ui); font-size:0.85rem; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .btn:hover { border-color:var(--accent); }
    .btn.primary { background:var(--accent); border-color:var(--accent); }
    .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(100px); opacity:0; background:var(--surface); border:1px solid var(--accent); border-radius:8px; padding:0.75rem 1.5rem; font-size:0.85rem; transition:all 0.3s; z-index:100; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .passphrase-words { background:var(--surface-2); border-radius:8px; padding:1rem; margin-bottom:1rem; display:none; }
    .passphrase-words.show { display:block; }
    .word-list { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.5rem; }
    .word-pill { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:0.25rem 0.5rem; font-size:0.8rem; font-family:var(--font-mono); }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>Password <span>Generator</span></h1><p class="subtitle">Contraseñas seguras y passphrases memorables</p></header>
    <div class="card">
      <div class="password-display">
        <div class="password-value" id="passwordValue" title="Click para copiar">—</div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
        <div class="strength-info"><span id="strengthLabel">—</span><span id="crackTime">—</span></div>
      </div>

      <div class="mode-select">
        <button class="mode-btn active" data-mode="random">Aleatoria</button>
        <button class="mode-btn" data-mode="passphrase">Passphrase</button>
      </div>

      <div class="options" id="randomOptions">
        <div class="slider-group"><label>Longitud</label><input type="range" id="length" min="6" max="64" value="16"><span class="slider-value" id="lengthValue">16</span></div>
        <div class="option-row"><label class="option-label">Mayúsculas <small>(A-Z)</small></label><div class="toggle"><input type="checkbox" id="uppercase" checked><span class="toggle-slider"></span></div></div>
        <div class="option-row"><label class="option-label">Minúsculas <small>(a-z)</small></label><div class="toggle"><input type="checkbox" id="lowercase" checked><span class="toggle-slider"></span></div></div>
        <div class="option-row"><label class="option-label">Números <small>(0-9)</small></label><div class="toggle"><input type="checkbox" id="numbers" checked><span class="toggle-slider"></span></div></div>
        <div class="option-row"><label class="option-label">Símbolos <small>(!@#$%...)</small></label><div class="toggle"><input type="checkbox" id="symbols"><span class="toggle-slider"></span></div></div>
      </div>

      <div class="passphrase-words" id="passphraseWords">
        <div style="font-size:0.85rem;color:var(--text-dim)">Palabras en esta passphrase:</div>
        <div class="word-list" id="wordList"></div>
      </div>

      <div class="actions">
        <button class="btn primary" id="generateBtn">Generar</button>
        <button class="btn" id="copyBtn">Copiar</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const WORDS = ['casa','sol','luna','mar','arbol','flor','cielo','agua','fuego','tierra','viento','roca','lago','rio','valle','monte','nube','lluvia','nieve','bruma','ave','pez','lobo','oso','zorro','ciervo','halcon','buitre','sierpe','torre','puente','farol','calle','plaza','fuente','muro','campo','selva','duna','cima','gruta','venado','lince','musgo','helecho','roble','pino','abeto','sauce','olmo','yedra','vid','trigo','miel','leche','pan','vino','sal','iel','cardo','brezo','lama','cetro','arpa','lira','tambor','cuerno','yunque','fragua','ascua','lumbre','brasa','horno','forja','bisel','filo','punta','lanza','escudo','yelmo','cota','greba'];
    let mode = 'random';
    const $ = id => document.getElementById(id);

    function playBeep() { try { const ctx=new (window.AudioContext||webkitAudioContext)(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=600; g.gain.setValueAtTime(0.1,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1); o.start(); o.stop(ctx.currentTime+0.1); } catch(e){} }

    function generatePassword() {
      const len = parseInt($('length').value);
      let chars = '';
      if ($('uppercase').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if ($('lowercase').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if ($('numbers').checked) chars += '0123456789';
      if ($('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
      if (!chars) { $('passwordValue').textContent = 'Selecciona al menos un tipo'; return; }
      let pwd = '';
      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      for (let i = 0; i < len; i++) pwd += chars[arr[i] % chars.length];
      return pwd;
    }

    function generatePassphrase() {
      const len = parseInt($('length').value);
      const count = Math.max(3, Math.min(10, Math.round(len / 3)));
      const selected = [];
      const used = new Set();
      const arr = new Uint32Array(count);
      crypto.getRandomValues(arr);
      for (let i = 0; i < count; i++) {
        const idx = arr[i] % WORDS.length;
        selected.push(WORDS[idx]);
        used.add(WORDS[idx]);
      }
      const wordList = $('wordList');
      wordList.innerHTML = selected.map(w => `<span class="word-pill">${w}</span>`).join('');
      $('passphraseWords').classList.add('show');
      return selected.join('-');
    }

    function calculateEntropy(charsetLen, len) { return len * Math.log2(charsetLen); }

    function updateStrength(pwd) {
      const len = pwd.length;
      const hasUpper = /[A-Z]/.test(pwd);
      const hasLower = /[a-z]/.test(pwd);
      const hasNum = /\d/.test(pwd);
      const hasSym = /[^A-Za-z0-9]/.test(pwd);
      const pool = (hasUpper?26:0) + (hasLower?26:0) + (hasNum?10:0) + (hasSym?32:0);
      const entropy = pool > 0 ? len * Math.log2(pool) : 0;
      const strength = entropy < 28 ? 1 : entropy < 36 ? 2 : entropy < 60 ? 3 : entropy < 100 ? 4 : 5;
      const labels = ['Muy débil','Débil','Media','Fuerte','Muy fuerte'];
      const colors = ['#EF4444','#EF4444','#F59E0B','#CE3D1F','#10B981'];
      const pcts = [15, 35, 55, 75, 100];
      $('strengthFill').style.width = pcts[strength-1] + '%';
      $('strengthFill').style.background = colors[strength-1];
      $('strengthLabel').textContent = labels[strength-1];
      const crackTime = entropy < 28 ? 'instantes' : entropy < 36 ? 'minutos' : entropy < 60 ? 'horas' : entropy < 80 ? 'días' : entropy < 100 ? 'años' : 'siglos';
      $('crackTime').textContent = `Tiempo estimado: ${crackTime}`;
    }

    function generate() {
      const pwd = mode === 'random' ? generatePassword() : generatePassphrase();
      if (!pwd) return;
      $('passwordValue').textContent = pwd;
      if (mode === 'random') { $('passphraseWords').classList.remove('show'); updateStrength(pwd); }
      else { $('strengthFill').style.width='100%'; $('strengthFill').style.background='#10B981'; $('strengthLabel').textContent='Fuerte'; $('crackTime').textContent='Fácil de recordar'; }
      playBeep();
    }

    $('generateBtn').addEventListener('click', generate);
    $('copyBtn').addEventListener('click', () => {
      const pwd = $('passwordValue').textContent;
      if (pwd && pwd !== '—') { navigator.clipboard.writeText(pwd).then(() => { $('toast').textContent='Copiado'; $('toast').classList.add('show'); setTimeout(()=>$('toast').classList.remove('show'),1500); }); }
    });

    $('passwordValue').addEventListener('click', () => $('copyBtn').click());

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        $('randomOptions').style.display = mode === 'random' ? 'grid' : 'none';
        $('passphraseWords').classList.remove('show');
        generate();
      });
    });

    // Auto-regenerate on option change
    const autoEls = ['uppercase','lowercase','numbers','symbols','length'];
    autoEls.forEach(id => {
      const el = $(id);
      if (el) el.addEventListener('input', () => { if (mode === 'random') generate(); });
    });

    // Length label sync
    $('length').addEventListener('input', () => { $('lengthValue').textContent = $('length').value; });

    generate();
  </script>
</body>
</html>
